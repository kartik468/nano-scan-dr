<header class="navbar">
  <div class="navbar__inner">
    @if (logo().route) {
      <a
        class="navbar__brand"
        [routerLink]="logo().route"
        [fragment]="logo().fragment"
      >
        <img
          class="navbar__logo"
          [ngSrc]="logo().src"
          [width]="logo().width"
          [height]="logo().height"
          [alt]="logo().alt"
          priority
        />
        @if (brandName()) {
          <span class="navbar__brand-text">{{ brandName() }}</span>
        }
      </a>
    } @else {
      <a class="navbar__brand" [href]="logo().href">
        <img
          class="navbar__logo"
          [ngSrc]="logo().src"
          [width]="logo().width"
          [height]="logo().height"
          [alt]="logo().alt"
          priority
        />
        @if (brandName()) {
          <span class="navbar__brand-text">{{ brandName() }}</span>
        }
      </a>
    }

    <button
      class="navbar__toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      [attr.aria-controls]="menuId()"
      [attr.aria-label]="toggleLabel()"
    >
      <span class="navbar__toggle-icon" aria-hidden="true"></span>
    </button>

    <nav
      class="navbar__nav"
      aria-label="Main navigation"
      [attr.id]="menuId()"
      [class.is-open]="isMenuOpen()"
    >
      @for (link of links(); track link.label) {
        @if (link.route) {
          <a
            class="navbar__link"
            [routerLink]="link.route"
            [fragment]="link.fragment"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: !!link.exact }"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        } @else {
          <a class="navbar__link" [href]="link.href" (click)="closeMenu()">
            {{ link.label }}
          </a>
        }
      }
    </nav>
  </div>
</header>
