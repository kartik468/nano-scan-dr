<app-navbar
  [logo]="navLogo"
  [links]="navLinks"
  [brandName]="brandName"
  [toggleLabel]="navToggleLabel"
  [menuId]="navMenuId"
/>

<section id="carousel">
  <app-carousel
    [slides]="carouselSlides"
    [headline]="carouselHeadline"
    [subcopy]="carouselSubcopy"
    [ctaLabel]="carouselCtaLabel"
    [ctaHref]="carouselCtaHref"
    [ctaRoute]="carouselCtaRoute"
    [labels]="carouselLabels"
    [autoAdvanceMs]="carouselAutoAdvanceMs"
  />
</section>

<section id="contact" aria-labelledby="contact-section-heading">
  <app-contact-section />
</section>

<app-footer [logo]="footerLogo" [text]="footerText" />
