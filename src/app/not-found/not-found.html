<main class="not-found" role="main">
  <div class="not-found__content">
    <span class="not-found__code" aria-hidden="true">{{ notFoundConfig().code }}</span>
    <h1 class="not-found__title">{{ notFoundConfig().title }}</h1>
    <p class="not-found__description">
      {{ notFoundConfig().description }}
    </p>
    <a class="not-found__cta" [routerLink]="[notFoundConfig().ctaRoute]">{{ notFoundConfig().ctaLabel }}</a>
  </div>
</main>
